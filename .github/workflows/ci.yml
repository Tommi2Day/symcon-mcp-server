name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run coverage

      - name: Upload coverage to Codecov
        if: matrix.node == '20'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  # ─── Integration Tests ────────────────────────────────────────────────────────
  integration:
    name: Integration Tests (Symcon Docker)
    runs-on: ubuntu-latest
    # Only run on main branch and PRs targeting main
    if: github.event_name == 'push' || github.base_ref == 'main'

    services:
      symcon-test:
        image: symcon/symcon:latest
        ports:
          - 3777:3777
        env:
          SYMCON_API_USER: test@symcon.de
          SYMCON_API_PASSWORD: symcon
        options: >-
          --entrypoint /bin/sh
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/3777 && echo -e \"GET /api/ HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && cat <&3 | grep -q \"HTTP/1.1 200\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Wait for Symcon to be ready
        run: |
          echo "Waiting for Symcon..."
          for i in $(seq 1 30); do
            if bash -c 'exec 3<>/dev/tcp/127.0.0.1/3777 && echo -e "GET /api/ HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3 && cat <&3' | grep -q 'HTTP/1.1 200'; then
              echo "Symcon is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 5
          done

      - name: Run integration tests
        env:
          SYMCON_TEST_URL: http://127.0.0.1:3777/api/
          SYMCON_API_USER: test@symcon.de
          SYMCON_API_PASSWORD: symcon
        run: npm run test:integration

  # ─── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: symcon-mcp-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker health endpoint
        run: |
          docker run -d --name symcon-mcp-ci \
            -p 4096:4096 \
            -e SYMCON_API_URL=http://127.0.0.1:1/api/ \
            -e MCP_AUTH_TOKEN="" \
            -e LOG_LEVEL=error \
            symcon-mcp-server:ci
          sleep 5
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:4096/health || true)
          # 200 (ok) or 503 (degraded but server is up) are both acceptable
          echo "Health endpoint returned: $HTTP"
          [[ "$HTTP" == "200" || "$HTTP" == "503" ]] || exit 1
          docker rm -f symcon-mcp-ci
