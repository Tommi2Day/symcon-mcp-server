name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage
        run: npx vitest run --coverage

  # ─── Integration Tests ────────────────────────────────────────────────────────
  integration:
    name: Integration Tests (Symcon Docker)
    runs-on: ubuntu-latest
    # Only run on main branch and PRs targeting main
    if: github.event_name == 'push' || github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Symcon via Docker Compose
        run: docker compose -f docker/docker-compose.test.yml up -d --wait

      - name: Run integration tests
        env:
          SYMCON_TEST_URL: http://127.0.0.1:3777/api/
        run: npm run test:integration

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Tommi2Day/symcon-mcp-server

      - name: Stop Symcon
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down --volumes
