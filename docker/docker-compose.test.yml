# ─────────────────────────────────────────────────────────────────────────────
# Symcon MCP Server – docker-compose for integration tests
# ─────────────────────────────────────────────────────────────────────────────
name: symcon-mcp-test
services:
  symcon-test:
    image: symcon/symcon:latest
    container_name: symcon-mcp-test
    ports:
      - "3777:3777"

    environment:
      SYMCON_API_USER: test@symcon.de
      SYMCON_API_PASSWORD: symcon

    entrypoint:
      - /bin/sh
      - -c
      - |
        if ! command -v wget >/dev/null 2>&1; then
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y wget
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache wget
          fi
        fi
        if [ ! -f /root/.symcon ]; then
          SYMCON_API_PASSWORD_BASE64=$$(echo -n "symcon" | base64)
          echo "Licensee=test@symcon.de" > /root/.symcon
          echo "Password=$$SYMCON_API_PASSWORD_BASE64" >> /root/.symcon
          chmod 600 /root/.symcon
        fi
        exec /usr/bin/symcon

    healthcheck:
      # Use wget for healthcheck as requested
      test: ["CMD", "wget", "-qO-", "http://localhost:3777/api/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
